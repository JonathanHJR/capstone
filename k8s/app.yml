apiVersion: apps/v1
kind: Deployment
metadata:
  name: calorie-tracker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: calorie-tracker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: calorie-tracker
    spec:
      serviceAccountName: calorie-tracker
      containers:
        - name: calorie-tracker
          image: jonathanhjr/calorie-tracker:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: url
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: calorie-tracker
  labels:
    app: calorie-tracker
spec:
  type: LoadBalancer
  selector:
    app: calorie-tracker
  ports:
    - name: http
      port: 8080
      targetPort: 8080
