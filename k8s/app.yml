apiVersion: apps/v1
kind: Deployment
metadata:
  name: calorie-tracker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: calorie-tracker
  template:
    metadata:
      labels:
        app: calorie-tracker
    spec:
      containers:
        - name: calorie-tracker
          image: jonathanhjr/calorie-tracker:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: DATABASE_URL
              value: host=postgres user=postgres password=postgres dbname=caloriedb port=5432 sslmode=disable
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: calorie-tracker
  labels:
    app: calorie-tracker
spec:
  type: NodePort
  selector:
    app: calorie-tracker
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30080
