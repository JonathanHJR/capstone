apiVersion: v1
kind: ConfigMap
metadata:
  name: calorie-tracker-dashboard
  namespace: default
  labels:
    grafana_dashboard: "1"
data:
  calorie-tracker.json: |
    {
      "title": "Calorie Tracker",
      "uid": "calorie-tracker",
      "schemaVersion": 39,
      "timezone": "browser",
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        {
          "id": 1,
          "title": "Replicas Up",
          "type": "stat",
          "gridPos": { "h": 6, "w": 6, "x": 0, "y": 0 },
          "targets": [
            { "expr": "sum(up{job=\"calorie-tracker\"})", "legendFormat": "up" }
          ]
        },
        {
          "id": 2,
          "title": "HTTP Requests/sec",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 6, "y": 0 },
          "targets": [
            {
              "expr": "sum by (method, path, status) (rate(http_requests_total[5m]))",
              "legendFormat": "{{method}} {{path}} {{status}}"
            }
          ]
        },
        {
          "id": 3,
          "title": "Meals Created/Deleted",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "targets": [
            { "expr": "rate(meals_created_total[5m])", "legendFormat": "created" },
            { "expr": "rate(meals_deleted_total[5m])", "legendFormat": "deleted" }
          ]
        },
        {
          "id": 4,
          "title": "Pod Restarts",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "targets": [
            {
              "expr": "kube_pod_container_status_restarts_total{pod=~\"calorie-tracker.*\"}",
              "legendFormat": "{{pod}}"
            }
          ]
        }
      ]
    }
