apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: calorie-tracker
  namespace: monitoring
  labels:
    release: monitoring
spec:
  groups:
    - name: calorie-tracker
      rules:
        - alert: CalorieTrackerDown
          expr: absent(up{job="calorie-tracker"}) OR up{job="calorie-tracker"} == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Calorie tracker target down"
            description: "Calorie tracker has no running instances or scrape is failing."
        - alert: CalorieTrackerNoReplicas
          expr: absent(up{job="calorie-tracker"}) OR count(up{job="calorie-tracker"} == 1) < 1
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "No healthy calorie-tracker replicas"
            description: "All calorie-tracker pods are down or unscraped."
